# ALARMv3 Configuration Example

project_name: "my_legacy_project"
target_path: "."
log_level: "INFO"

analyzer:
  max_file_size: 10485760  # 10MB
  supported_languages:
    - python
    - javascript
    - typescript
    - java
    - csharp
    - cpp
    - go
    - rust
    - php
    - ruby
  exclude_patterns:
    - "*.pyc"
    - "__pycache__/*"
    - "node_modules/*"
    - "*.min.js"
    - "*.min.css"
    - "dist/*"
    - "build/*"
    - ".git/*"
  include_patterns:
    - "*"

modernization:
  target_frameworks:
    - ".NET 8"
    - "Python 3.12"
    - "Node.js 20"
    - "Java 21"
  migration_strategies:
    - "incremental"
    - "adapter-pattern"
    - "test-first"
  risk_threshold: "medium"  # low, medium, high

ai:
  enable_ai: true
  enable_rag: true
  model_name: "default"
  max_context_size: 8192
  temperature: 0.7

output:
  output_dir: "./alarmv3_output"
  generate_reports: true
  generate_documentation: true
  report_format: "markdown"  # markdown, html, json
